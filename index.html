<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Figui Marketplace</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff5a1f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Figui">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --cream: #f5f0e8;
    --orange: #ff5a1f;
    --orange2: #ff8c00;
    --green: #00c48c;
    --card-bg: #fff;
    --border: #e0ddd6;
    --muted: #888;
    --tag-bg: #f0ede5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--orange);
  }
  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--orange); }
  .badge {
    background: var(--orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
  }

  /* HERO */
  .hero {
    background: var(--ink);
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(26px, 5vw, 48px);
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .hero h1 em {
    color: var(--orange);
    font-style: normal;
    display: block;
  }
  .hero p {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* AI SEARCH */
  .ai-box {
    background: #1a1a1a;
    border: 1.5px solid #333;
    border-radius: 16px;
    padding: 20px;
    max-width: 680px;
    margin: 0 auto;
  }
  .ai-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .ai-label::before {
    content: '✦';
    font-size: 14px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-row input {
    flex: 1;
    background: #111;
    border: 1.5px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .search-row input:focus { border-color: var(--orange); }
  .search-row input::placeholder { color: #555; }
  .btn-ask {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-ask:hover { background: #e04d16; }
  .btn-ask:active { transform: scale(.97); }
  .btn-ask:disabled { opacity: .5; cursor: not-allowed; }

  .ai-answer {
    margin-top: 14px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13.5px;
    color: #ddd;
    line-height: 1.65;
    min-height: 40px;
    display: none;
  }
  .ai-answer.visible { display: block; }
  .ai-answer strong { color: var(--orange); }
  .thinking { color: #666; font-style: italic; }

  /* IMAGE DROP ZONE */
  .drop-zone {
    margin-top: 10px;
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    background: #111;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--orange);
    background: #1c1209;
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-zone-label {
    font-size: 12px;
    color: #777;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .drop-zone-label span { color: var(--orange); font-weight: 600; }
  .drop-zone.has-img .drop-zone-label { display: none; }
  .drop-preview {
    display: none;
    align-items: center;
    gap: 12px;
    text-align: left;
  }
  .drop-zone.has-img .drop-preview { display: flex; }
  .drop-img {
    width: 64px; height: 64px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid var(--green);
    flex-shrink: 0;
  }
  .drop-img-info { flex: 1; }
  .drop-img-info p { font-size: 12px; color: var(--green); font-weight: 600; margin-bottom: 3px; }
  .drop-img-info small { font-size: 11px; color: #666; }
  .drop-remove {
    background: #2a2a2a;
    border: none; color: #aaa;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s;
  }
  .drop-remove:hover { background: var(--orange); color: #fff; }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* FILTERS */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 22px;
    align-items: center;
  }
  .filter-input {
    flex: 1;
    min-width: 200px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
  }
  .filter-input:focus { border-color: var(--orange); }
  .cat-select {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }
  .sort-select {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }
  .count-tag {
    font-size: 12px;
    color: var(--muted);
    padding: 6px 12px;
    background: var(--tag-bg);
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .count-tag strong { color: var(--ink); }

  /* CATEGORY PILLS */
  .cat-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
  }
  .pill {
    background: var(--tag-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    color: var(--ink);
  }
  .pill:hover { border-color: var(--orange); color: var(--orange); }
  .pill.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: box-shadow .2s, transform .15s, border-color .2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .2s;
  }
  .card:hover {
    box-shadow: 0 8px 28px rgba(0,0,0,.1);
    transform: translateY(-2px);
    border-color: #ccc;
  }
  .card:hover::before { transform: scaleX(1); }

  .card-cat {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 8px;
    text-transform: capitalize;
  }
  .card-desc {
    font-size: 12px;
    color: #777;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .price {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
  }
  .price.no-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    font-style: italic;
  }
  .date-chip {
    font-size: 11px;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 3px 8px;
    border-radius: 6px;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    grid-column: 1 / -1;
  }
  .empty svg { margin-bottom: 12px; opacity: .3; }
  .empty p { font-size: 15px; }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    padding: 28px;
    position: relative;
    max-height: 85vh;
    overflow-y: auto;
    animation: popIn .2s ease;
  }
  @keyframes popIn {
    from { transform: scale(.93); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: #f0ede5;
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
  }
  .modal-cat {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .modal-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 16px;
    text-transform: capitalize;
  }
  .modal-price {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--orange);
    margin-bottom: 16px;
  }
  .modal-price.no-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
  }
  .modal-desc {
    font-size: 14px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 16px;
    padding: 14px;
    background: var(--cream);
    border-radius: 10px;
  }
  .modal-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .meta-chip {
    background: var(--tag-bg);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--muted);
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--orange);
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  @media (max-width: 600px) {
    .controls { flex-direction: column; }
    .filter-input { width: 100%; }
    .grid { grid-template-columns: 1fr; }
    .ai-box { padding: 14px; }
    .search-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FIGUI <span>Marketplace</span></div>
  <div class="badge">481 productos</div>
</header>

<div class="hero">
  <h1>Catálogo de <em>Productos</em></h1>
  <p>Todos tus artículos de Facebook Marketplace en un solo lugar</p>

  <div class="ai-box">
    <div class="ai-label">Búsqueda con IA · Imagen + Texto</div>
    <div class="search-row">
      <input type="text" id="aiInput" placeholder="¿Tienes algo similar? ¿Cuánto cuesta?..." />
      <button class="btn-ask" onclick="askAI()">Preguntar ✦</button>
    </div>

    <!-- Hidden real file input — triggered by button click -->
    <input type="file" id="imgFileInput" accept="image/*" capture="environment"
           style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"
           onchange="handleImageFile(this.files[0])" />

    <!-- Image area: shows button or preview -->
    <div id="imgArea" style="margin-top:10px;">
      <!-- STATE: no image -->
      <div id="imgEmpty" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <button onclick="document.getElementById('imgFileInput').click()"
          style="background:#1a1a1a;border:2px dashed #555;border-radius:10px;padding:10px 18px;
                 color:#aaa;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;
                 display:flex;align-items:center;gap:6px;transition:border-color .2s;">
          📷 Adjuntar imagen de referencia
        </button>
        <span style="font-size:11px;color:#555;font-style:italic;">o pega con Ctrl+V en escritorio</span>
      </div>
      <!-- STATE: image loaded -->
      <div id="imgLoaded" style="display:none;background:#1a1a1a;border:1.5px solid #00c48c;
                                  border-radius:10px;padding:10px 14px;
                                  display:none;align-items:center;gap:10px;">
        <img id="imgPreview" src="" alt="" style="width:56px;height:56px;border-radius:8px;object-fit:cover;border:2px solid #00c48c;flex-shrink:0;" />
        <div style="flex:1;">
          <p style="color:#00c48c;font-size:12px;font-weight:700;margin-bottom:3px;">✅ Imagen lista</p>
          <small style="color:#666;font-size:11px;">Escribe tu pregunta y toca Preguntar</small>
        </div>
        <button onclick="removeImage()"
          style="background:#2a2a2a;border:none;color:#aaa;border-radius:8px;
                 padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">
          ✕ Quitar
        </button>
      </div>
    </div>

    <div class="ai-answer" id="aiAnswer"></div>
  </div>
</div>

<main>
  <div class="stats-bar" id="statsBar"></div>

  <div class="controls">
    <input type="text" class="filter-input" id="searchInput" placeholder="🔍 Buscar producto..." oninput="filterProducts()" />
    <select class="cat-select" id="catSelect" onchange="filterProducts()">
      <option value="">Todas las categorías</option>
    </select>
    <select class="sort-select" id="sortSelect" onchange="filterProducts()">
      <option value="default">Orden original</option>
      <option value="price-asc">Precio: menor a mayor</option>
      <option value="price-desc">Precio: mayor a menor</option>
      <option value="az">A → Z</option>
    </select>
    <div class="count-tag" id="countTag">Cargando...</div>
  </div>

  <div class="cat-pills" id="catPills"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeOverlay()">✕</button>
    <div class="modal-cat" id="mCat"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-price" id="mPrice"></div>
    <div class="modal-desc" id="mDesc"></div>
    <div class="modal-meta" id="mMeta"></div>
  </div>
</div>

function selectCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', (cat === '' && p.textContent === '✦ Todo') || p.dataset.cat === cat);
  });
  document.getElementById('catSelect').value = cat;
  filterProducts();
}

// Stats
function buildStats() {
  const withPrice = PRODUCTS.filter(p => p.p).length;
  const cats = CATEGORIES.length;
  const priceNums = PRODUCTS.filter(p => p.p).map(p => {
    const n = parseFloat(p.p.replace(/[$,]/g, ''));
    return isNaN(n) ? 0 : n;
  });
  const avgPrice = priceNums.length ? Math.round(priceNums.reduce((a,b)=>a+b,0)/priceNums.length) : 0;

  const statsEl = document.getElementById('statsBar');
  statsEl.innerHTML = `
    <div class="stat"><div class="stat-num">${PRODUCTS.length}</div><div class="stat-label">Productos totales</div></div>
    <div class="stat"><div class="stat-num">${cats}</div><div class="stat-label">Categorías</div></div>
    <div class="stat"><div class="stat-num">${withPrice}</div><div class="stat-label">Con precio</div></div>
    <div class="stat"><div class="stat-num">$${avgPrice.toLocaleString()}</div><div class="stat-label">Precio promedio</div></div>
  `;
}

function parsePrice(p) {
  if (!p) return -1;
  return parseFloat(p.replace(/[$,]/g, '')) || -1;
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('catSelect').value;
  const sort = document.getElementById('sortSelect').value;

  if (cat !== activeCat) { selectCat(cat); return; }

  filtered = PRODUCTS.filter(p => {
    const matchQ = !q || p.t.toLowerCase().includes(q) || p.d.toLowerCase().includes(q);
    const matchC = !cat || p.c === cat;
    return matchQ && matchC;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => parsePrice(a.p) - parsePrice(b.p));
  else if (sort === 'price-desc') filtered.sort((a,b) => parsePrice(b.p) - parsePrice(a.p));
  else if (sort === 'az') filtered.sort((a,b) => a.t.localeCompare(b.t));

  document.getElementById('countTag').innerHTML = `<strong>${filtered.length}</strong> de ${PRODUCTS.length} productos`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><p>No se encontraron productos</p></div>';
    return;
  }
  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" onclick="openModal(${PRODUCTS.indexOf(p)})">
      <div class="card-cat">${catIcons[p.c] || ''} ${p.c}</div>
      <div class="card-title">${p.t}</div>
      ${p.d ? `<div class="card-desc">${p.d}</div>` : ''}
      <div class="card-footer">
        ${p.p ? `<div class="price">${p.p}</div>` : `<div class="price no-price">Precio a cotizar</div>`}
        ${p.f ? `<div class="date-chip">${p.f} 2026</div>` : ''}
      </div>
    </div>
  `).join('');
}

function openModal(i) {
  const p = PRODUCTS[i];
  document.getElementById('mCat').textContent = (catIcons[p.c]||'') + ' ' + p.c;
  document.getElementById('mTitle').textContent = p.t;
  document.getElementById('mPrice').textContent = p.p || 'Precio a cotizar';
  document.getElementById('mPrice').className = 'modal-price' + (p.p ? '' : ' no-price');
  document.getElementById('mDesc').textContent = p.d || 'Sin descripción disponible.';
  document.getElementById('mMeta').innerHTML = [
    p.f ? `<span class="meta-chip">📅 ${p.f} 2026</span>` : '',
    `<span class="meta-chip">🏷️ ${p.c}</span>`,
    p.p ? `<span class="meta-chip">💰 ${p.p}</span>` : '',
  ].filter(Boolean).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlay();
});

// IMAGE HANDLING
let imageBase64 = null;
let imageMimeType = null;

function handleImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  imageMimeType = file.type;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    imageBase64 = dataUrl.split(',')[1];
    document.getElementById('imgPreview').src = dataUrl;
    document.getElementById('imgEmpty').style.display = 'none';
    document.getElementById('imgLoaded').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null;
  imageMimeType = null;
  document.getElementById('imgPreview').src = '';
  document.getElementById('imgFileInput').value = '';
  document.getElementById('imgEmpty').style.display = 'flex';
  document.getElementById('imgLoaded').style.display = 'none';
}

// Paste from clipboard (desktop Ctrl+V)
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      handleImageFile(item.getAsFile());
      break;
    }
  }
});

    const res = await fetch('https://restless-meadow-aacc.kitolomitolokito.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });
    const data = await res.json();
    if (data.error) {
      ans.innerHTML = '<span style="color:#ff5a1f">Error API: ' + data.error.message + '</span>';
      btn.disabled = false; btn.textContent = 'Preguntar ✦';
      return;
    }
    const text = data.content?.[0]?.text || 'No se pudo obtener respuesta.';
    ans.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  } catch(e) {
    ans.innerHTML = '<span style="color:#ff5a1f">Error al conectar. Intenta de nuevo.</span>';
  }

  btn.disabled = false;
  btn.textContent = 'Preguntar ✦';
}

document.getElementById('aiInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') askAI();
});

      .then(() => console.log('SW registrado ✓'))
      .catch(err => console.log('SW error:', err));
  });
}
